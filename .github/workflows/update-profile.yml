name: Actualizar perfil vivo

on:
  schedule:
    # GitHub usa UTC; una ejecución diaria evita ruido y mantiene vivo el README.
    - cron: "17 11 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/build_profile.py"
      - "scripts/fetch_linkedin_profile.mjs"
      - ".github/linkedin.profile.example.json"
      - ".github/profile.config.json"
      - ".github/workflows/update-profile.yml"
      - "AGENTS.md"

permissions:
  contents: write

concurrency:
  group: perfil-vivo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-profile:
    name: Regenerar README del perfil
    runs-on: ubuntu-latest
    env:
      LINKEDIN_COOKIE_PRESENT: ${{ secrets.LINKEDIN_COOKIE != '' }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v6

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Preparar Node para LinkedIn
        if: env.LINKEDIN_COOKIE_PRESENT == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Extraer snapshot LinkedIn con navegador
        if: env.LINKEDIN_COOKIE_PRESENT == 'true'
        timeout-minutes: 5
        env:
          LINKEDIN_COOKIE: ${{ secrets.LINKEDIN_COOKIE }}
          LINKEDIN_PROFILE_URL: "https://www.linkedin.com/in/cehp94/"
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          npm install --no-save --ignore-scripts playwright@1.56.1
          node scripts/fetch_linkedin_profile.mjs > .linkedin-profile.json

      - name: Diagnosticar LinkedIn vivo sin respaldo
        if: env.LINKEDIN_COOKIE_PRESENT == 'true'
        continue-on-error: true
        env:
          LINKEDIN_COOKIE: ${{ secrets.LINKEDIN_COOKIE }}
          LINKEDIN_PROFILE_JSON_FILE: .linkedin-profile.json
        run: python scripts/build_profile.py --linkedin-diagnostics --require-linkedin-when-configured

      - name: Diagnosticar fuente LinkedIn
        env:
          LINKEDIN_COOKIE: ${{ secrets.LINKEDIN_COOKIE }}
          LINKEDIN_PROFILE_JSON: ${{ secrets.LINKEDIN_PROFILE_JSON }}
          LINKEDIN_PROFILE_JSON_FILE: .linkedin-profile.json
        run: python scripts/build_profile.py --linkedin-diagnostics --require-linkedin-when-configured

      - name: Generar README desde GitHub + Gravatar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINKEDIN_COOKIE: ${{ secrets.LINKEDIN_COOKIE }}
          LINKEDIN_PROFILE_JSON: ${{ secrets.LINKEDIN_PROFILE_JSON }}
          LINKEDIN_PROFILE_JSON_FILE: .linkedin-profile.json
        run: python scripts/build_profile.py --write

      - name: Validar README generado
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINKEDIN_COOKIE: ${{ secrets.LINKEDIN_COOKIE }}
          LINKEDIN_PROFILE_JSON: ${{ secrets.LINKEDIN_PROFILE_JSON }}
          LINKEDIN_PROFILE_JSON_FILE: .linkedin-profile.json
        run: python scripts/build_profile.py --check

      - name: Commit de cambios automáticos
        run: |
          if [[ -z "$(git status --porcelain README.md)" ]]; then
            echo "README.md ya está actualizado; no hay commit nuevo."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: actualiza perfil vivo"
          git push
